# Abakos compute-provider config (daemon / provider-services run).
# Filled by scripts/20-register-provider.sh — uses config/network.sh.
from: "PROVIDER_ADDRESS"
node: "ABA_RPC_PLACEHOLDER"
chainid: "ABA_CHAIN_ID_PLACEHOLDER"
gasprices: "0uaba"
keyring-backend: "ABA_KEYRING_PLACEHOLDER"
domain: "ABA_PROVIDER_DOMAIN_PLACEHOLDER"
host_uri: "ABA_HOST_URI_PLACEHOLDER"
withdrawalperiod: 12h
attributes:
  - key: host
    value: abakos
  - key: tier
    value: community
  - key: capabilities/cpu/arch
    value: x86-64
