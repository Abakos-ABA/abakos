name: desktop-release

# Build + sign + publish the Abakos Provider desktop app (Tauri v2) for
# Windows, Linux and macOS on a version tag, and attach a signed `latest.json`
# so the in-app auto-updater works across all platforms.
#
# Requires two repo secrets (Settings → Secrets → Actions):
#   TAURI_SIGNING_PRIVATE_KEY           contents of desktop/.tauri/updater.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  its password (empty string if none)
# Without them the signed build step fails by design (createUpdaterArtifacts).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.1.10)"
        required: true

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev libssl-dev \
            libgtk-3-dev libayatana-appindicator3-dev patchelf file

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      - name: Build, sign and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Abakos Provider ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: "Abakos Provider desktop app (ABA wallet + one-click CPU/GPU miner). Auto-update enabled."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
